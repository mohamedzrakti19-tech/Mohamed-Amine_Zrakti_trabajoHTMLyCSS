    <link rel="stylesheet" href="../css/estilos.css">

<body>

    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">
                <h1>Innova<span>Web</span></h1>
            </div>
            
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html">Inicio</a></li>

                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="form-container">
            <h1>Solicitar Presupuesto Personalizado</h1>
            <p>Por favor, rellene todos los campos para que podamos enviarle una propuesta detallada.</p>

            <form action="#" method="POST" class="budget-form">
                
                <div class="form-group">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono de contacto:</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="600 000 000" required>
                </div>

                <div class="form-group">
                    <label for="mensaje">Solicite más información:</label>
                    <textarea id="mensaje" name="mensaje" rows="6" placeholder="Cuéntenos sobre su proyecto..." required></textarea>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="privacidad" name="privacidad" required>
                    <label for="privacidad">Acepto la <a href="#">Política de privacidad</a> de la empresa.</label>
                </div>

                <div class="form-submit">
                    <button type="submit" class="btn-submit">Enviar Solicitud</button>
                </div>
                
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container footer-grid">
            <div class="footer-info">

            </div>

</div>
